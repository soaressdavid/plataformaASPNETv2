version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: ../../..
      dockerfile: src/Services/Worker/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - ConnectionStrings__Redis=redis:6379
      - Docker__Uri=unix:///var/run/docker.sock
      - DOTNET_ENVIRONMENT=Development
    volumes:
      # Mount Docker socket to allow worker to create containers
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    deploy:
      replicas: 2  # Run 2 worker instances for parallel processing

volumes:
  redis-data:
