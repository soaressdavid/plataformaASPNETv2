---
# Primary Service (Write Operations)
apiVersion: v1
kind: Service
metadata:
  name: sql-server-primary
  namespace: platform-saas-prod
  labels:
    app: sql-server
    role: primary
spec:
  type: ClusterIP
  ports:
    - port: 1433
      targetPort: 1433
      protocol: TCP
      name: sql
  selector:
    app: sql-server
    role: primary

---
# Read Replica Service (Read Operations - Load Balanced)
apiVersion: v1
kind: Service
metadata:
  name: sql-server-replicas
  namespace: platform-saas-prod
  labels:
    app: sql-server
    role: replica
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  ports:
    - port: 1433
      targetPort: 1433
      protocol: TCP
      name: sql
  selector:
    app: sql-server
    role: replica

---
# Individual Replica Services (for direct access if needed)
apiVersion: v1
kind: Service
metadata:
  name: sql-server-replica-1
  namespace: platform-saas-prod
  labels:
    app: sql-server
    role: replica
spec:
  type: ClusterIP
  ports:
    - port: 1433
      targetPort: 1433
      protocol: TCP
      name: sql
  selector:
    app: sql-server
    role: replica
    replica-id: "1"

