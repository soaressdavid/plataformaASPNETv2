apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlexecutor-service
  namespace: aspnet-learning-platform
  labels:
    app: sqlexecutor-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sqlexecutor-service
  template:
    metadata:
      labels:
        app: sqlexecutor-service
    spec:
      containers:
      - name: sqlexecutor-service
        image: aspnet-learning-platform/sqlexecutor-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: ASPNETCORE_ENVIRONMENT
        - name: ASPNETCORE_URLS
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: ASPNETCORE_URLS
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: REDIS_PORT
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: platform-secrets
              key: SQL_CONNECTION_STRING
        resources:
          requests:
            memory: "512Mi"
            cpu: "300m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sqlexecutor-service
  namespace: aspnet-learning-platform
  labels:
    app: sqlexecutor-service
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: sqlexecutor-service
