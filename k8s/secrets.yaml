apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: aspnet-learning-platform
type: Opaque
stringData:
  # Database Credentials (base64 encoded in production)
  POSTGRES_USER: "platform_user"
  POSTGRES_PASSWORD: "platform_pass"
  
  # RabbitMQ Credentials
  RABBITMQ_USER: "platform_user"
  RABBITMQ_PASSWORD: "platform_pass"
  
  # JWT Secret (CHANGE THIS IN PRODUCTION!)
  JWT_SECRET: "your-super-secret-jwt-key-change-this-in-production"
  
  # Groq API Key (CHANGE THIS IN PRODUCTION!)
  GROQ_API_KEY: "your-groq-api-key-here"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: aspnet-learning-platform
type: Opaque
stringData:
  POSTGRES_USER: "platform_user"
  POSTGRES_PASSWORD: "platform_pass"
  POSTGRES_DB: "aspnet_learning_platform"
