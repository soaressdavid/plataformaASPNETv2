apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-storage
  namespace: platform-saas
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: platform-saas
type: Opaque
stringData:
  admin-user: admin
  admin-password: REPLACE_WITH_SECURE_PASSWORD
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: platform-saas
  labels:
    app: grafana
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        component: monitoring
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.2.2
          ports:
            - name: web
              containerPort: 3000
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: admin-password
            - name: GF_INSTALL_PLUGINS
              value: "grafana-piechart-panel,grafana-clock-panel"
            - name: GF_SERVER_ROOT_URL
              value: "http://grafana.platform-saas.svc.cluster.local:3000"
            - name: GF_SMTP_ENABLED
              value: "true"
            - name: GF_SMTP_HOST
              value: "smtp.gmail.com:587"
            - name: GF_SMTP_USER
              value: "alerts@platform-saas.com"
            - name: GF_SMTP_PASSWORD
              value: "REPLACE_WITH_SMTP_PASSWORD"
            - name: GF_SMTP_FROM_ADDRESS
              value: "grafana@platform-saas.com"
            - name: GF_ALERTING_ENABLED
              value: "true"
            - name: GF_UNIFIED_ALERTING_ENABLED
              value: "true"
          volumeMounts:
            - name: storage
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-system-overview
              mountPath: /var/lib/grafana/dashboards/system-overview.json
              subPath: system-overview.json
            - name: dashboard-api-metrics
              mountPath: /var/lib/grafana/dashboards/api-metrics.json
              subPath: api-metrics.json
            - name: dashboard-database-metrics
              mountPath: /var/lib/grafana/dashboards/database-metrics.json
              subPath: database-metrics.json
            - name: dashboard-message-queue
              mountPath: /var/lib/grafana/dashboards/message-queue.json
              subPath: message-queue.json
            - name: dashboard-microservices
              mountPath: /var/lib/grafana/dashboards/microservices.json
              subPath: microservices.json
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: grafana-storage
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: dashboard-system-overview
          configMap:
            name: grafana-dashboard-system-overview
        - name: dashboard-api-metrics
          configMap:
            name: grafana-dashboard-api-metrics
        - name: dashboard-database-metrics
          configMap:
            name: grafana-dashboard-database-metrics
        - name: dashboard-message-queue
          configMap:
            name: grafana-dashboard-message-queue
        - name: dashboard-microservices
          configMap:
            name: grafana-dashboard-microservices
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: platform-saas
  labels:
    app: grafana
    component: monitoring
spec:
  type: LoadBalancer
  ports:
    - name: web
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: grafana
