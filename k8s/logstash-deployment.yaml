# Logstash Deployment for Log Pipeline Processing
# Ingests logs from all microservices and forwards to Elasticsearch
# Supports structured logging with correlation IDs
# Requirements: 52.9, 52.13

---
# Logstash ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: platform-saas-prod
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    path.config: /usr/share/logstash/pipeline
    xpack.monitoring.enabled: true
    xpack.monitoring.elasticsearch.hosts: ["http://elasticsearch:9200"]
  
  logstash.conf: |
    input {
      # TCP input for structured logs from microservices
      tcp {
        port => 5000
        codec => json_lines
        tags => ["microservice"]
      }
      
      # HTTP input for REST-based log ingestion
      http {
        port => 8080
        codec => json
        tags => ["http"]
      }
      
      # Beats input for Filebeat (if used)
      beats {
        port => 5044
        tags => ["beats"]
      }
    }
    
    filter {
      # Parse timestamp
      date {
        match => ["timestamp", "ISO8601"]
        target => "@timestamp"
      }
      
      # Add service name if not present
      if ![service] {
        mutate {
          add_field => { "service" => "unknown" }
        }
      }
      
      # Parse log level
      if [level] {
        mutate {
          uppercase => ["level"]
        }
      }
      
      # Extract correlation ID for distributed tracing
      if [correlationId] {
        mutate {
          add_field => { "trace.id" => "%{correlationId}" }
        }
      }
      
      # Parse exception stack traces
      if [exception] {
        mutate {
          add_tag => ["has_exception"]
        }
      }
      
      # Add environment tag
      mutate {
        add_field => { "environment" => "production" }
      }
      
      # Grok patterns for unstructured logs (fallback)
      if "_jsonparsefailure" in [tags] {
        grok {
          match => {
            "message" => [
              "%{TIMESTAMP_ISO8601:timestamp} \[%{LOGLEVEL:level}\] %{GREEDYDATA:message}",
              "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{GREEDYDATA:message}"
            ]
          }
        }
      }
      
      # Remove temporary fields
      mutate {
        remove_field => ["host", "port"]
      }
    }
    
    output {
      # Output to Elasticsearch
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "logs-%{[service]}-%{+YYYY.MM.dd}"
        document_type => "_doc"
      }
      
      # Debug output (can be disabled in production)
      # stdout {
      #   codec => rubydebug
      # }
    }
  
  pipelines.yml: |
    - pipeline.id: main
      path.config: "/usr/share/logstash/pipeline/logstash.conf"

---
# Logstash Service
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: platform-saas-prod
  labels:
    app: logstash
spec:
  type: ClusterIP
  selector:
    app: logstash
  ports:
  - name: tcp
    port: 5000
    targetPort: 5000
    protocol: TCP
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: beats
    port: 5044
    targetPort: 5044
    protocol: TCP

---
# Logstash Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: platform-saas-prod
  labels:
    app: logstash
spec:
  replicas: 2
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      serviceAccountName: monitoring-sa
      containers:
      - name: logstash
        image: docker.elastic.co/logstash/logstash:8.11.3
        ports:
        - name: tcp
          containerPort: 5000
          protocol: TCP
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: beats
          containerPort: 5044
          protocol: TCP
        - name: monitoring
          containerPort: 9600
          protocol: TCP
        env:
        - name: LS_JAVA_OPTS
          value: "-Xms1g -Xmx1g"
        - name: ELASTICSEARCH_HOSTS
          value: "http://elasticsearch:9200"
        resources:
          requests:
            memory: "1.5Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: config
          mountPath: /usr/share/logstash/config/logstash.yml
          subPath: logstash.yml
        - name: pipeline
          mountPath: /usr/share/logstash/pipeline/logstash.conf
          subPath: logstash.conf
        - name: pipelines
          mountPath: /usr/share/logstash/config/pipelines.yml
          subPath: pipelines.yml
        livenessProbe:
          httpGet:
            path: /
            port: 9600
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 9600
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
      volumes:
      - name: config
        configMap:
          name: logstash-config
          items:
          - key: logstash.yml
            path: logstash.yml
      - name: pipeline
        configMap:
          name: logstash-config
          items:
          - key: logstash.conf
            path: logstash.conf
      - name: pipelines
        configMap:
          name: logstash-config
          items:
          - key: pipelines.yml
            path: pipelines.yml

---
# Logstash HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: logstash-hpa
  namespace: platform-saas-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: logstash
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
