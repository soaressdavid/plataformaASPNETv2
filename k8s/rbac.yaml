---
# Role for Code Executor - needs Docker socket access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: code-executor-role
  namespace: platform-saas-prod
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]

---
# RoleBinding for Code Executor
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: code-executor-rolebinding
  namespace: platform-saas-prod
subjects:
- kind: ServiceAccount
  name: code-executor-sa
  namespace: platform-saas-prod
roleRef:
  kind: Role
  name: code-executor-role
  apiGroup: rbac.authorization.k8s.io

---
# Role for SQL Executor - needs pod management
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sql-executor-role
  namespace: platform-saas-prod
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]

---
# RoleBinding for SQL Executor
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sql-executor-rolebinding
  namespace: platform-saas-prod
subjects:
- kind: ServiceAccount
  name: sql-executor-sa
  namespace: platform-saas-prod
roleRef:
  kind: Role
  name: sql-executor-role
  apiGroup: rbac.authorization.k8s.io

---
# Role for API Gateway - read-only access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: api-gateway-role
  namespace: platform-saas-prod
rules:
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]

