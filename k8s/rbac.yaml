  namespace: platform-saas-prod
subjects:
- kind: ServiceAccount
  name: api-gateway-sa
  namespace: platform-saas-prod
roleRef:
  kind: Role
  name: api-gateway-role
  apiGroup: rbac.authorization.k8s.io

