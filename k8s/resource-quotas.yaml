# Development Environment Resource Quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-resource-quota
  namespace: platform-saas-dev
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "10"
    pods: "50"
    services: "20"
    secrets: "50"
    configmaps: "50"

---
# Staging Environment Resource Quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: staging-resource-quota
  namespace: platform-saas-staging
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    persistentvolumeclaims: "20"
    pods: "100"
    services: "30"
    secrets: "100"
    configmaps: "100"

---
# Production Environment Resource Quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: prod-resource-quota
  namespace: platform-saas-prod
spec:
  hard:
    requests.cpu: "100"
    requests.memory: 200Gi
    limits.cpu: "200"
    limits.memory: 400Gi
    persistentvolumeclaims: "50"
    pods: "500"
    services: "50"
    secrets: "200"
    configmaps: "200"
