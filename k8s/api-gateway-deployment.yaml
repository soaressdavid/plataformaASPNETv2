apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: aspnet-learning-platform
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: aspnet-learning-platform/api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: ASPNETCORE_ENVIRONMENT
        - name: ASPNETCORE_URLS
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: ASPNETCORE_URLS
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: AUTH_SERVICE_URL
        - name: COURSE_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: COURSE_SERVICE_URL
        - name: CHALLENGE_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: CHALLENGE_SERVICE_URL
        - name: PROGRESS_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: PROGRESS_SERVICE_URL
        - name: AITUTOR_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: AITUTOR_SERVICE_URL
        - name: EXECUTION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: EXECUTION_SERVICE_URL
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: REDIS_HOST
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: platform-secrets
              key: JWT_SECRET
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: aspnet-learning-platform
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: api-gateway
