# Network Policy for Code Executor - Restrict container network access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: code-executor-network-policy
  namespace: platform-saas-prod
spec:
  podSelector:
    matchLabels:
      app: code-executor
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 80
  egress:
  # Allow DNS resolution
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  # Allow Redis access
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow RabbitMQ access
  - to:
    - podSelector:
        matchLabels:
          app: rabbitmq
    ports:
    - protocol: TCP
      port: 5672

