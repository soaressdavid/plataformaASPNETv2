---
# Network Policy for API Gateway - Allow external traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-network-policy
  namespace: platform-saas-prod
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
  egress:
  # Allow all egress for API Gateway to reach all microservices
  - to:
    - podSelector: {}

---
# Network Policy for Database - Restrict access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-network-policy
  namespace: platform-saas-prod
spec:
  podSelector:
    matchLabels:
      app: sqlserver
  policyTypes:
  - Ingress
  ingress:
  # Only allow specific services to access database
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    - podSelector:
        matchLabels:
          app: gamification-engine
    - podSelector:
        matchLabels:
          app: analytics-service
    - podSelector:
        matchLabels:
          app: notification-service
    ports:
    - protocol: TCP
      port: 1433

---
# Network Policy for Redis - Restrict access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-network-policy
  namespace: platform-saas-prod
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  # Allow all microservices to access Redis
  - from:
    - podSelector:
        matchLabels:
          app: code-executor
    - podSelector:
        matchLabels:
          app: sql-executor
    - podSelector:
        matchLabels:
          app: gamification-engine
    - podSelector:
        matchLabels:
          app: ai-tutor
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 6379

---
# Network Policy for RabbitMQ - Restrict access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq-network-policy
  namespace: platform-saas-prod
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
  - Ingress
  ingress:
  # Allow all microservices to access RabbitMQ
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 5672
    - protocol: TCP
      port: 15672

---
