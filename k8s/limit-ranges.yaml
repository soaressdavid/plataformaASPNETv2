# Development Environment Limit Range
apiVersion: v1
kind: LimitRange
metadata:
  name: dev-limit-range
  namespace: platform-saas-dev
spec:
  limits:
  - max:
      cpu: "2"
      memory: 4Gi
    min:
      cpu: "100m"
      memory: 128Mi
    default:
      cpu: "500m"
      memory: 512Mi
    defaultRequest:
      cpu: "250m"
      memory: 256Mi
    type: Container
  - max:
      cpu: "4"
      memory: 8Gi
    min:
      cpu: "200m"
      memory: 256Mi
    type: Pod

---
# Staging Environment Limit Range
apiVersion: v1
kind: LimitRange
metadata:
  name: staging-limit-range
  namespace: platform-saas-staging
spec:
  limits:
  - max:
      cpu: "4"
      memory: 8Gi
    min:
      cpu: "100m"
      memory: 128Mi
    default:
      cpu: "1"
      memory: 1Gi
    defaultRequest:
      cpu: "500m"
      memory: 512Mi
    type: Container
  - max:
      cpu: "8"
      memory: 16Gi
    min:
      cpu: "200m"
      memory: 256Mi
    type: Pod

---
# Production Environment Limit Range
apiVersion: v1
kind: LimitRange
metadata:
  name: prod-limit-range
  namespace: platform-saas-prod
spec:
  limits:
  - max:
      cpu: "8"
      memory: 16Gi
    min:
      cpu: "100m"
      memory: 128Mi
    default:
      cpu: "2"
      memory: 2Gi
    defaultRequest:
      cpu: "1"
      memory: 1Gi
    type: Container
  - max:
      cpu: "16"
      memory: 32Gi
    min:
      cpu: "200m"
      memory: 256Mi
    type: Pod
  - max:
      storage: 100Gi
    min:
      storage: 1Gi
    type: PersistentVolumeClaim
