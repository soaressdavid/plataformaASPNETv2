        app: api-gateway
        version: v1
    spec:
      containers:
      - name: api-gateway
        image: platform-saas/api-gateway:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ApplicationInsights__ConnectionString
          valueFrom:
            secretKeyRef:
              name: appinsights-secret
              key: connection-string
        
        - name: SERVICE_NAME
          value: "ApiGateway"
        
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        
        envFrom:
        - configMapRef:
            name: appinsights-config
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
