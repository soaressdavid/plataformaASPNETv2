global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'aspnet-learning-platform'
    environment: 'production'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them
# rule_files:
#   - "alerts.yml"

scrape_configs:
  # API Gateway
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Auth Service
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8081']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Course Service
  - job_name: 'course-service'
    static_configs:
      - targets: ['course-service:8082']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Challenge Service
  - job_name: 'challenge-service'
    static_configs:
      - targets: ['challenge-service:8083']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Progress Service
  - job_name: 'progress-service'
    static_configs:
      - targets: ['progress-service:8084']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # AI Tutor Service
  - job_name: 'ai-tutor-service'
    static_configs:
      - targets: ['ai-tutor-service:8085']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Execution Service
  - job_name: 'execution-service'
    static_configs:
      - targets: ['execution-service:8086']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Workers (adjust targets based on your worker count)
  - job_name: 'workers'
    static_configs:
      - targets: 
          - 'worker-1:8087'
          - 'worker-2:8088'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
